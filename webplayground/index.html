<body>
    <h1><span id="lang-name">ɭeŋ</span> - A simple programming language</h1>
    <div id="content">
        <div id="left">
            <div id="prompt">
                <h3>Write your program here:</h3>
                <div id="secondary-buttons"></div>
                <div id="run" onclick="runProgram()">Run Program</div>
            </div>



            <textarea id="file-content"></textarea>
        </div>
        <div id="right">
            <h3>stdin:</h3>
            <textarea id="stdin" cols="30"></textarea>

            <h3>stdout:</h3>
            <pre id="stdout"></pre>
        </div>
    </div>
    <hr />
    <div id="repolink">
        <a href="https://github.com/leonw774/lreng">Github Repo</a>
    </div>
    <div id="readme"></div>

    <script src="codemirror/lib/codemirror.js"></script>
    <script>
        let editor = CodeMirror.fromTextArea(
            document.getElementById('file-content'), {
            lineNumbers: true,
        });
        editor.setSize(null, "67vh");
        fetch("./scripts/index.html")
            .then(res => res.text())
            .then(pathStr => pathStr.split('\n').filter(path => path.length))
            .then(
                pathList => Promise.all(
                    pathList.map(
                        file => fetch(`./${file}`).then(res => res.text())
                    )
                ).then(
                    scriptList => scriptList.map(
                        (script, index) => [
                            pathList[index].split('/').pop()?.split('.')[0] ?? '?',
                            script
                        ]
                    )
                )
                // ).then(
                //     (fileNameScriptList) => {
                //         const examplesTitle = document.createElement('span');
                //         examplesTitle.innerText = 'Example programs:';
                //         const examplesBlock = document.getElementById('secondary-buttons');
                //         examplesBlock.appendChild(examplesTitle);
                //         fileNameScriptList.forEach(([fileName, script]) => {
                //             const exampleBotton = document.createElement('div');
                //             exampleBotton.className = "secondary-button";
                //             exampleBotton.onclick = () => editor.setValue(script);
                //             exampleBotton.innerText = fileName;
                //             examplesBlock.appendChild(exampleBotton)
                //         });
                //     }
                // );
            ).then(
                (fileNameScriptList) => {
                    // Create a label and a select dropdown for examples
                    const examplesBlock = document.getElementById('secondary-buttons');

                    const examplesLabel = document.createElement('span');
                    // examplesLabel.innerText = 'Example programs:';
                    examplesLabel.style.marginRight = '8px';

                    const select = document.createElement('select');
                    select.id = 'examples-select';
                    // apply the existing button style so it visually fits
                    select.className = 'secondary-button';

                    const placeholder = document.createElement('option');
                    placeholder.value = '';
                    placeholder.innerText = 'Choose example...';
                    select.appendChild(placeholder);

                    fileNameScriptList.forEach(([fileName, script], idx) => {
                        const opt = document.createElement('option');
                        opt.value = String(idx);
                        opt.innerText = fileName;
                        select.appendChild(opt);
                    });

                    // On change, load the selected example into the editor
                    select.addEventListener('change', (e) => {
                        const idx = e.target.value;
                        if (idx === '') return;
                        editor.setValue(fileNameScriptList[Number(idx)][1]);
                    });

                    examplesBlock.appendChild(examplesLabel);
                    examplesBlock.appendChild(select);
                }
            );
    </script>

    <script src="lreng.js"></script>
    <script>
        // Redirect stdin and stdout
        let stdin = document.getElementById('stdin').value;
        let stdinStream = new TextEncoder().encode(stdin + '\n');
        let stdinIndex = 0;
        const outputElement = document.getElementById('stdout');
        Module.FS.init(
            // Read from stdin
            () => stdinStream[stdinIndex++] || null,
            // Write to stdout
            char => outputElement.textContent += String.fromCharCode(char),
            // Write to stderr
            char => outputElement.textContent += String.fromCharCode(char)
        );

        async function runProgram() {
            // Get user inputs
            const fileContent = editor.getValue();
            stdin = document.getElementById('stdin').value;
            stdinStream = new TextEncoder().encode(stdin + '\n');
            stdinIndex = 0;

            // Remove previously created file
            try {
                FS.unlink('input.txt');
            } catch (e) {
                // Ignore errors if the file doesn't exist
            }

            // Prepare the virtual file system
            FS.writeFile('input.txt', fileContent);

            // Clear previous output
            outputElement.textContent = '';

            // Run the program
            try {
                await Module.callMain(['input.txt']);
            }
            catch (error) {
                outputElement.textContent = (
                    'Program exits with error: ' + JSON.stringify(error)
                );
            }
        }
    </script>

    <script src="showdown/dist/showdown.min.js"></script>
    <script>
        async function showReadMe() {
            const showdownConverter = new showdown.Converter({
                tables: true,
                ghCodeBlocks: true,
                disableForced4SpacesIndentedSublists: true,
            });
            fetch('./README.md')
                .then(res => res.text())
                .then(
                    readmeStr => (
                        readmeStr
                            .replace('# ɭeŋ', '')
                            .replace('&#124;&#124;', '||')
                    )
                )
                .then(readmeStr => {
                    const readmeDiv = document.getElementById('readme')
                    readmeDiv.innerHTML = showdownConverter.makeHtml(readmeStr)
                });

        }
        showReadMe();
    </script>

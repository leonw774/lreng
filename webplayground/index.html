    <h1><span id="lang-name">ɭeŋ</span> - A simple programming language</h1>
    <div id="content">
        <div id="left">
            <h3>Write your program here:</h3>
            <div id="buttons">
                <div id="run" onclick="runProgram()">Run Program</div>
            </div>
            <textarea id="file-content"></textarea>

            <!-- New row of buttons under the coding area -->
            <div id="bottom-buttons">
                Example programs:
                <div class="bottom-button" onclick="editor.setValue(examplePrograms[0]);">Hello World</div>
                <div class="bottom-button" onclick="editor.setValue(examplePrograms[1]);">Fizz Buzz</div>
                <!-- you can add more quick-insert buttons here -->
            </div>

            <h3>stdin:</h3>
            <textarea id="stdin" cols="30"></textarea>
        </div>
        <div id="right">
            <h3>stdout:</h3>
            <pre id="stdout"></pre>
        </div>
    </div>
    <hr />
    <div id="repolink">
        <a href="https://github.com/leonw774/lreng">Github Repo</a>
    </div>

    <script src="codemirror/lib/codemirror.js"></script>
    <script>
        let editor = CodeMirror.fromTextArea(
            document.getElementById("file-content"), {
                lineNumbers: true
            }
        );
        const examplePrograms = [
// Hello world
            `
print = string => {
    string != null && (output (<string); print (>string))
};
print ('H', 'e', 'l', 'l', 'o', ' ', 'w', 'o', 'r', 'l', 'd', '\\n', null)
`.trimStart(),
// Fizz Buzz
            `
list_append = list_elem => {
    list = <list_elem;
    elem = >list_elem;
    list == null
        && (elem, null)
        || (
            >list == null
                && (<list, elem, null)
                || (<list, list_append (>list, elem))
        )
};
format_int = i => {
    i < 10 && ((i + '0'), null) || (
        list_append (
            format_int (\\(i / 10)),
            ((i % 10) + '0')
        )
    )
};
print = string => {
    string != null && (output (<string); print (>string))
};
fizz_str = 'F', 'I', 'Z', 'Z', null;
buzz_str = 'B', 'U', 'Z', 'Z', null;
fizzbuzz_str = 'F', 'I', 'Z', 'Z', 'B', 'U', 'Z', 'Z', null;
fizzbuzz = n => {
    n != 1 && fizzbuzz (n-1);
    print (
        ((n % 15 == 0) && fizzbuzz_str)
        || ((n % 5 == 0) && buzz_str)
        || ((n % 3 == 0) && fizz_str)
        || format_int n
    );
    output '\\n'
};
fizzbuzz 30
`.trimStart()
        ];
    </script>

    <script src="lreng.js"></script>
    <script>
        // Redirect stdin and stdout
        let stdin = document.getElementById('stdin').value;
        let stdinStream = new TextEncoder().encode(stdin + '\n');
        let stdinIndex = 0;
        const outputElement = document.getElementById('stdout');
        Module.FS.init(
            // Read from stdin
            () => stdinStream[stdinIndex++] || null,
            // Write to stdout
            char => outputElement.textContent += String.fromCharCode(char),
            // Write to stderr
            char => outputElement.textContent += String.fromCharCode(char)
        );

        async function runProgram() {
            // Get user inputs
            const fileContent = editor.getValue();
            stdin = document.getElementById('stdin').value;
            stdinStream = new TextEncoder().encode(stdin + '\n');
            stdinIndex = 0;

            // Remove previously created file
            try {
                FS.unlink('input.txt');
            } catch (e) {
                // Ignore errors if the file doesn't exist
            }

            // Prepare the virtual file system
            FS.writeFile('input.txt', fileContent);
            
            // Clear previous output
            outputElement.textContent = '';

            // Run the program
            try {
                await Module.callMain(["input.txt"]);
            }
            catch (error) {
                outputElement.textContent = (    
                    "Program exits with error: " + JSON.stringify(error)
                );
            }
        }
    </script>

    <script src="showdown/dist/showdown.min.js"></script>
    <script>
        async function showReadMe() {
            const showdownConverter = new showdown.Converter({
                tables: true,
                ghCodeBlocks: true,
                disableForced4SpacesIndentedSublists: true
            });
            let readmeStr = await (await fetch("./README.md")).text();
            readmeStr = readmeStr.replace("# ɭeŋ", "")
            readmeStr = readmeStr.replace("&#124;&#124;", "||")
            document.getElementById("readme").innerHTML = showdownConverter.makeHtml(
                readmeStr
            );
        }
        showReadMe();
    </script>
